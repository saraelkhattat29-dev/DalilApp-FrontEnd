<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>خدمات المرور</title>
    <link rel="stylesheet" href="assets/servicesincategoryPage.css" />
    <link rel="stylesheet" href="assets/nav.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
</head>

<body>

   <!-- NAVBAR -->
  <header class="header">
    <nav class="nav container">
      <a href="#" class="nav__logo"><span>د</span>ليل</a>
      <div class="nav__menu" id="nav-menu">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link ">الرئيسية</a></li>
          <li><a href="community.html" class="nav__link">المجتمع</a></li>
          <li><a href="aboutUs.html" class="nav__link">عن دليل</a></li>
          <li><a href="contact.html" class="nav__link">تواصل معنا</a></li>
        </ul>
        <div class="nav__close" id="nav-close">
          <i class="ri-close-line"></i>
        </div>
      </div>
      <div class="nav__actions">
        <div id="auth-section" class="auth-section"></div>
        <div class="nav__toggle" id="nav-toggle">
          <i class="ri-menu-line"></i>
        </div>
      </div>
    </nav>
  </header>
    <main class="page-wrapper">

        <!-- Header -->
        <header class="page-header">
            <div class="header-inner">
                <a href="#" class="back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                    العودة إلى الرئيسية
                </a>
                <div class="header-top">
                    <div class="cat-icon-wrap" id="catIconWrap">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <path d="M8 21h8M12 17v4"/>
                            <path d="M7 9h.01M17 9h.01M12 9h.01"/>
                        </svg>
                    </div>
                    <div>
                        <p class="cat-eyebrow">تصفح الخدمات</p>
                        <h1 class="page-title" id="catTitle">المرور</h1>
                    </div>
                </div>
                <p class="cat-desc" id="catDesc">جميع خدمات المرور المتاحة إلكترونياً وحضورياً في مكان واحد</p>
            </div>
            <div class="header-deco" aria-hidden="true">
                <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="80" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <circle cx="100" cy="100" r="55" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                    <circle cx="100" cy="100" r="30" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
                    <path d="M100 20 L180 100 L100 180 L20 100 Z" stroke="rgba(229,99,60,0.3)" stroke-width="1"/>
                </svg>
            </div>
        </header>

        <!-- Filters & Search -->
        <div class="controls-row">
            <div class="search-wrap">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="ابحث عن خدمة..." />
                <button class="search-clear" id="searchClear" aria-label="مسح البحث" hidden>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="filter-tabs" id="filterTabs" role="tablist">
                <button class="filter-tab active" data-filter="all" role="tab">الكل</button>
                <button class="filter-tab" data-filter="أونلاين" role="tab">أونلاين</button>
                <button class="filter-tab" data-filter="حضوري" role="tab">حضوري</button>
            </div>
        </div>

        <!-- Results count -->
        <p class="results-label" id="resultsLabel"></p>

        <!-- Services Grid -->
        <div class="services-grid" id="servicesGrid">
            <!-- cards injected by JS -->
        </div>

    </main>

    <script src="assets/servicesincategoryPage.js"></script>
    <script src="assets/nav.js"></script>
</body>
</html>
